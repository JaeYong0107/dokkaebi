services:
  postgres:
    image: postgres:16-alpine
    container_name: dokkaebi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dokkaebi
      POSTGRES_PASSWORD: dokkaebi
      POSTGRES_DB: dokkaebi
    ports:
      - "5432:5432"
    volumes:
      - dokkaebi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokkaebi -d dokkaebi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dokkaebi-pgdata:
